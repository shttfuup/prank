<!DOCTYPE html>
<html>
<head>
  <title>Loading System...</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #22c55e;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #terminal {
      width: 80%;
      max-width: 600px;
      border: 1px solid #22c55e;
      padding: 20px;
      background: black;
      height: 250px;
      overflow: hidden;
    }

    #progress {
      width: 80%;
      max-width: 600px;
      height: 10px;
      background: #333;
      margin-top: 20px;
    }

    #bar {
      width: 0%;
      height: 100%;
      background: #22c55e;
    }

    #scare {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 9999;
    }
  </style>
</head>
<body>

<h2>Klik untuk mulai...</h2>

<div id="terminal"></div>

<div id="progress">
  <div id="bar"></div>
</div>

<img id="scare" src="scare.jpg">
<audio id="sound" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>

<script>
document.body.addEventListener("click", () => {

  const text = [
    "Connecting to server...",
    "Bypassing firewall...",
    "Accessing database...",
    "Decrypting files...",
    "WARNING: Unauthorized access detected!",
    "Tracking location...",
    "IP FOUND: 192.168.0.1",
    "Sending data..."
  ];

  let i = 0;
  const terminal = document.getElementById("terminal");

  function typing() {
    if (i < text.length) {
      terminal.innerHTML += text[i] + "<br>";
      i++;
      setTimeout(typing, 600);
    }
  }

  typing();

  let width = 0;
  const bar = document.getElementById("bar");

  const load = setInterval(() => {
    width += 5;
    bar.style.width = width + "%";

    if (width >= 100) {
      clearInterval(load);

      setTimeout(() => {
        document.body.style.background = "black";
        document.querySelector("h2").style.display = "none";
        document.getElementById("terminal").style.display = "none";
        document.getElementById("progress").style.display = "none";

        const img = document.getElementById("scare");
        const sound = document.getElementById("sound");

        img.style.display = "block";
        sound.play().catch(() => {});
      }, 1000);
    }
  }, 300);

}, { once: true });
</script>

</body>
</html>
